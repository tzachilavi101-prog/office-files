<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2e"/>
      <stop offset="50%" style="stop-color:#112040"/>
      <stop offset="100%" style="stop-color:#0d1b2e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a855"/>
      <stop offset="40%" style="stop-color:#c9973e"/>
      <stop offset="70%" style="stop-color:#b8852c"/>
      <stop offset="100%" style="stop-color:#c9973e"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0b86a"/>
      <stop offset="50%" style="stop-color:#a87428"/>
      <stop offset="100%" style="stop-color:#d4a040"/>
    </linearGradient>
    <!-- Polygon shapes for background texture -->
    <clipPath id="bg-clip">
      <rect width="900" height="380"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" fill="url(#bgGrad)"/>

  <!-- Geometric polygon texture (top-right) -->
  <polygon points="620,0 900,0 900,280 750,380 580,200" fill="#162540" opacity="0.5"/>
  <polygon points="700,0 900,0 900,180 780,0" fill="#1a2d4a" opacity="0.4"/>
  <line x1="620" y1="0" x2="750" y2="380" stroke="#1e3050" stroke-width="1" opacity="0.6"/>
  <line x1="700" y1="0" x2="900" y2="280" stroke="#1e3050" stroke-width="1" opacity="0.5"/>
  <line x1="760" y1="0" x2="580" y2="200" stroke="#1e3050" stroke-width="0.8" opacity="0.4"/>

  <!-- Small 4-pointed star bottom-right -->
  <g transform="translate(860,340)" fill="#c9a84c" opacity="0.7">
    <polygon points="0,-10 2.5,-2.5 10,0 2.5,2.5 0,10 -2.5,2.5 -10,0 -2.5,-2.5"/>
  </g>

  <!-- LNS Circle emblem (right side) -->
  <g transform="translate(680,190)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#circleGrad)" stroke-width="2.5"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="102" fill="none" stroke="url(#circleGrad)" stroke-width="1" opacity="0.5"/>

    <!-- LNS text -->
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="72" font-weight="400" letter-spacing="4"
          fill="url(#goldGrad)">LNS</text>
  </g>

  <!-- Firm name text (left side, RTL) -->
  <text x="560" y="155"
        text-anchor="end"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="68" font-weight="700"
        fill="#ffffff"
        direction="rtl">לביא, ניסים-שלו</text>

  <text x="560" y="225"
        text-anchor="end"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="38" font-weight="300"
        fill="rgba(255,255,255,0.75)"
        letter-spacing="4"
        direction="rtl">משרד עורכי דין</text>
</svg>
