<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Files</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
        }

        .container {
            text-align: center;
            padding: 60px 40px;
            max-width: 700px;
        }

        .badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #e2b96f;
            border: 1px solid rgba(226, 185, 111, 0.4);
            padding: 6px 18px;
            border-radius: 999px;
            margin-bottom: 32px;
        }

        h1 {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        h1 span {
            background: linear-gradient(90deg, #e2b96f, #f0d080);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.75;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 48px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            background: #e2b96f;
            color: #1a1a2e;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.05em;
            padding: 14px 36px;
            border-radius: 4px;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
        }

        .btn:hover {
            background: #f0cc88;
            transform: translateY(-2px);
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e2b96f, transparent);
            margin: 40px auto 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Welcome</div>
        <h1>Hello & <span>Welcome</span></h1>
        <p>This is the official office files page. Everything you need is organized and accessible right here.</p>
        <a href="#" class="btn">Get Started</a>
        <div class="divider"></div>
    </div>
</body>
</html>
