<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עו"ד צחי לביא</title>
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Frank Ruhl Libre', 'David Libre', serif;
            background-color: #0d1b2e;
            color: #c9a84c;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER / LOGO ===== */
        header {
            background-color: #0d1b2e;
            padding: 40px 40px 36px;
            text-align: center;
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
        }

        .logo-img {
            max-width: min(640px, 85%);
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* ===== HERO ===== */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 40px;
            text-align: center;
            background: linear-gradient(180deg, #0d1b2e 0%, #0a1525 100%);
        }

        .hero-tagline {
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            color: rgba(201, 168, 76, 0.7);
            font-weight: 300;
            letter-spacing: 0.08em;
            margin-bottom: 20px;
        }

        .hero-title {
            font-size: clamp(1.8rem, 4vw, 3rem);
            font-weight: 400;
            color: #fff;
            line-height: 1.4;
            max-width: 700px;
            margin-bottom: 40px;
        }

        .hero-title em {
            color: #c9a84c;
            font-style: normal;
        }

        /* ===== PRACTICE AREAS ===== */
        .areas {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 56px;
        }

        .area-pill {
            border: 1px solid rgba(201, 168, 76, 0.5);
            color: #c9a84c;
            padding: 10px 24px;
            font-size: 1rem;
            font-family: inherit;
            letter-spacing: 0.04em;
            border-radius: 2px;
        }

        /* ===== CTA ===== */
        .cta-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary {
            background: #c9a84c;
            color: #0d1b2e;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            padding: 14px 40px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s, transform 0.2s;
        }

        .btn-primary:hover {
            background: #dfc06a;
            transform: translateY(-2px);
        }

        .btn-outline {
            border: 1px solid rgba(201, 168, 76, 0.6);
            color: #c9a84c;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            padding: 14px 40px;
            text-decoration: none;
            display: inline-block;
            transition: border-color 0.2s, transform 0.2s;
        }

        .btn-outline:hover {
            border-color: #c9a84c;
            transform: translateY(-2px);
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 24px;
            font-size: 0.85rem;
            color: rgba(201, 168, 76, 0.4);
            border-top: 1px solid rgba(201, 168, 76, 0.1);
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.svg" alt='לביא, ניסים-שלו משרד עורכי דין' class="logo-img">
    </header>

    <section class="hero">
        <div class="hero-tagline">ייצוג מקצועי ואישי</div>
        <h1 class="hero-title">
            נלחם למענך לקבלת <em>הפיצוי המגיע לך</em>
        </h1>

        <div class="areas">
            <span class="area-pill">רשלנות רפואית</span>
            <span class="area-pill">תאונות דרכים</span>
            <span class="area-pill">נזקי גוף</span>
            <span class="area-pill">ביטוח לאומי</span>
        </div>

        <div class="cta-group">
            <a href="tel:+972" class="btn-primary">צור קשר עכשיו</a>
            <a href="#" class="btn-outline">קרא עוד</a>
        </div>
    </section>

    <footer>
        &copy; 2026 עו"ד צחי לביא &mdash; כל הזכויות שמורות
    </footer>

</body>
</html>
